name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC shared
            cc: gcc
            cxx: g++
            link_mode: shared
            man_pages: enabled
          - name: GCC static
            cc: gcc
            cxx: g++
            link_mode: static
            man_pages: disabled
          - name: Clang shared
            cc: clang
            cxx: clang++
            link_mode: shared
            man_pages: disabled
          - name: Clang static
            cc: clang
            cxx: clang++
            link_mode: static
            man_pages: disabled
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - name: Check out libpkgstate
        uses: actions/checkout@v4

      - name: Check out libpkgimage 0.3.0
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgimage
          ref: e1f6dfd8cc4bfeb2f8da44345d8ec6368281c6e0
          path: subprojects/libpkgimage

      - name: Check out libpkgplan 0.1.0
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgplan
          ref: a5dfd231aee8ed39175a5a366173a50b7bd3374a
          path: subprojects/libpkgplan

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            clang \
            doxygen \
            libacl1-dev \
            libarchive-dev \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev \
            mandoc \
            ninja-build \
            pkg-config \
            python3-venv \
            scdoc \
            zlib1g-dev

      - name: Install Meson 1.6.1
        run: |
          python3 -m venv "$RUNNER_TEMP/meson"
          "$RUNNER_TEMP/meson/bin/pip" install meson==1.6.1
          echo "$RUNNER_TEMP/meson/bin" >> "$GITHUB_PATH"

      - name: Configure, build, and test
        run: |
          ./ci/configure-and-test.sh \
            build \
            "${{ matrix.link_mode }}" \
            --buildtype=debug \
            -Dman_pages="${{ matrix.man_pages }}"

      - name: Qualify generated manuals and API reference
        if: matrix.man_pages == 'enabled'
        run: |
          ./ci/lint-manpages.sh build
          doxygen Doxyfile

      - name: Qualify installed consumers
        run: ./ci/qualify-installed.sh build "${{ matrix.link_mode }}"

  release:
    name: GCC release with NDEBUG
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      CC: gcc
      CXX: g++
    steps:
      - name: Check out libpkgstate
        uses: actions/checkout@v4

      - name: Check out libpkgimage 0.3.0
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgimage
          ref: e1f6dfd8cc4bfeb2f8da44345d8ec6368281c6e0
          path: subprojects/libpkgimage

      - name: Check out libpkgplan 0.1.0
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgplan
          ref: a5dfd231aee8ed39175a5a366173a50b7bd3374a
          path: subprojects/libpkgplan

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            libacl1-dev \
            libarchive-dev \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev \
            ninja-build \
            pkg-config \
            python3-venv \
            zlib1g-dev

      - name: Install Meson 1.6.1
        run: |
          python3 -m venv "$RUNNER_TEMP/meson"
          "$RUNNER_TEMP/meson/bin/pip" install meson==1.6.1
          echo "$RUNNER_TEMP/meson/bin" >> "$GITHUB_PATH"

      - name: Configure, build, and test
        run: |
          ./ci/configure-and-test.sh \
            build-release \
            shared \
            --buildtype=release \
            -Db_ndebug=true \
            -Dman_pages=disabled

      - name: Qualify installed consumers
        run: ./ci/qualify-installed.sh build-release shared

  sanitizers:
    name: ${{ matrix.name }} sanitizers
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            cc: gcc
            cxx: g++
          - name: Clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
      UBSAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_stacktrace=1
    steps:
      - name: Check out libpkgstate
        uses: actions/checkout@v4

      - name: Check out libpkgimage 0.3.0
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgimage
          ref: e1f6dfd8cc4bfeb2f8da44345d8ec6368281c6e0
          path: subprojects/libpkgimage

      - name: Check out libpkgplan 0.1.0
        uses: actions/checkout@v4
        with:
          repository: zeppe-lin/libpkgplan
          ref: a5dfd231aee8ed39175a5a366173a50b7bd3374a
          path: subprojects/libpkgplan

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang \
            libacl1-dev \
            libarchive-dev \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev \
            ninja-build \
            pkg-config \
            python3-venv \
            zlib1g-dev

      - name: Install Meson 1.6.1
        run: |
          python3 -m venv "$RUNNER_TEMP/meson"
          "$RUNNER_TEMP/meson/bin/pip" install meson==1.6.1
          echo "$RUNNER_TEMP/meson/bin" >> "$GITHUB_PATH"

      - name: Configure, build, and test
        run: |
          ./ci/configure-and-test.sh \
            build-sanitize \
            shared \
            --buildtype=debug \
            -Db_sanitize=address,undefined \
            -Db_lundef=false \
            -Dman_pages=disabled
